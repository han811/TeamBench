# Role Enforcement Ablation — Locked Experiment Configuration
# Do not edit without incrementing `version` and logging rationale in README.md status log.
# The full state at setup time is captured in ../environment/.

version: 1
created: 2026-04-24
created_by: ybkim95

# --- Models --------------------------------------------------------------
# 3 families. OpenRouter routes are pinned to a single back-end provider with
# allow_fallbacks=false to keep run-to-run behavior deterministic.

models:
  - name: gemini_3_flash
    adapter: openrouter
    slug: google/gemini-3-flash-preview
    provider_pin: google-ai-studio
    api_key_env: OPENROUTER_API
    notes: Primary model. Most existing TNI evidence in the 155-task pool.

  - name: gpt_5_4_mini
    adapter: openai_direct
    slug: gpt-5.4-mini
    provider_pin: null      # direct API; no routing layer
    api_key_env: OPENAI_API_KEY

  - name: claude_haiku_4_5
    adapter: openrouter
    slug: anthropic/claude-haiku-4.5
    provider_pin: anthropic  # already default in openai_adapter.py:371-374
    api_key_env: OPENROUTER_API

# --- Conditions ----------------------------------------------------------
# Factorial decomposition of "enforcement" into (workspace isolation) ×
# (information isolation). Prompt-only lacks both; enforced has both;
# enforced_shared_history isolates only workspace.

conditions:
  prompt_only:
    description: Same P/E/V prompts; shared workspace; shared message history; no OS isolation
    workspace: shared
    history: shared
    role_prompts: true
    os_enforcement: false

  enforced:
    description: Current TeamBench — separate containers, separate histories, OS enforcement
    workspace: isolated
    history: isolated
    role_prompts: true
    os_enforcement: true

  enforced_shared_history:
    description: OS workspace isolation; shared message history (factor decomposition)
    workspace: isolated
    history: shared
    role_prompts: true
    os_enforcement: true

# --- Seeds ---------------------------------------------------------------
seeds: [0, 1]

# --- Task selection ------------------------------------------------------
task_selection:
  n: 25
  source_file: config/task_selection.json        # generated by scripts/02_select_tasks.py
  # Stratification draws from 155-task ablation pool using TNI classification
  # (harness/compute_tni.py). Counts sum to 25.
  stratification:
    high_tni: 10     # TNI > 1.0   — enforcement effect well-established
    team_helps: 8    # 0 < TNI ≤ 1 — moderate signal
    team_hurts: 5    # TNI < 0     — honest cost reporting
    neutral: 2       # |TNI| ≈ 0   — stability anchor
  selection_seed: 42  # deterministic within-stratum sampling

# --- Runtime -------------------------------------------------------------
runtime:
  max_turns_per_phase: 20
  max_remediation: 2
  timeout_per_run_seconds: 900
  parallelism:
    models_concurrent: 3        # models run in parallel
    conditions_per_model: 1     # conditions sequential within a model (rate-limit friendly)

# --- Accounting ----------------------------------------------------------
total_runs: 450   # 25 tasks × 3 conditions × 3 models × 2 seeds
